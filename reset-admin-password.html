<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Admin Password</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        h1 { color: #333; margin-top: 0; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #5568d3; }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .message {
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Reset Admin Password</h1>
        
        <div class="warning message">
            ⚠️ <strong>Important:</strong> You need your Supabase Service Role Key for this. 
            Find it in: Supabase Dashboard → Settings → API → service_role key (secret)
        </div>

        <form id="reset-form">
            <label><strong>Service Role Key:</strong></label>
            <input type="password" id="serviceKey" placeholder="eyJhb..." required>
            
            <label><strong>User Email:</strong></label>
            <input type="email" id="userEmail" placeholder="your-email@example.com" required>
            
            <label><strong>New Password:</strong></label>
            <input type="password" id="newPassword" placeholder="Enter new password" required minlength="6">
            
            <button type="submit">Reset Password</button>
        </form>

        <div id="messages"></div>

        <div style="margin-top: 30px;">
            <a href="index.html">← Back to Home</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ggbcxmyszuahivgjzmou.supabase.co';

        function showMessage(message, type = 'info') {
            const messagesDiv = document.getElementById('messages');
            const messageEl = document.createElement('div');
            messageEl.className = `message ${type}`;
            messageEl.innerHTML = message;
            messagesDiv.appendChild(messageEl);
        }

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const serviceKey = document.getElementById('serviceKey').value;
            const userEmail = document.getElementById('userEmail').value;
            const newPassword = document.getElementById('newPassword').value;
            
            const button = e.target.querySelector('button');
            button.disabled = true;
            button.textContent = 'Resetting...';
            
            document.getElementById('messages').innerHTML = '';
            
            try {
                // Create admin client with service role key
                const adminClient = window.supabase.createClient(SUPABASE_URL, serviceKey, {
                    auth: {
                        autoRefreshToken: false,
                        persistSession: false
                    }
                });
                
                // Get user by email
                const { data: users, error: listError } = await adminClient.auth.admin.listUsers();
                
                if (listError) throw new Error('Failed to list users: ' + listError.message);
                
                const user = users.users.find(u => u.email === userEmail);
                
                if (!user) {
                    throw new Error('User not found with email: ' + userEmail);
                }
                
                // Update user password using admin API
                const { data, error } = await adminClient.auth.admin.updateUserById(
                    user.id,
                    { password: newPassword }
                );
                
                if (error) throw error;
                
                showMessage('✅ Password updated successfully! You can now login with the new password.', 'success');
                
                // Clear form
                document.getElementById('reset-form').reset();
                button.textContent = 'Password Reset Complete ✓';
                button.style.background = '#28a745';
                
            } catch (error) {
                console.error('Reset error:', error);
                showMessage('❌ Error: ' + error.message, 'error');
                button.disabled = false;
                button.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
