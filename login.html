<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Login - 10 to Master</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 20px;
        }
        .auth-box {
            background: linear-gradient(90deg, rgba(225, 162, 205, 1) 52%, rgba(234, 223, 165, 1) 100%);
            border-radius: 20px;
            padding: 48px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-logo .logo-text {
            color: black !important;
            background: none !important;
            -webkit-background-clip: unset !important;
            -webkit-text-fill-color: black !important;
            background-clip: unset !important;
        }
        .auth-logo img {
            max-width: 200px;
            height: auto;
        }
        .auth-title {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            color: black;
        }
        .auth-subtitle {
            text-align: center;
            color: black;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: black;
        }
        .form-group input {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #E1A2CD;
        }
        .auth-button {
            width: 100%;
            padding: 16px;
            background: black;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }
        .auth-button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        .auth-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .auth-links {
            text-align: center;
            margin-top: 24px;
        }
        .auth-links a {
            color: black;
            text-decoration: none;
            font-weight: 500;
        }
        .auth-links a:hover {
            text-decoration: underline;
        }
        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .success-message {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .divider {
            text-align: center;
            margin: 24px 0;
            color: #999;
            position: relative;
        }
        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #e0e0e0;
        }
        .divider::before {
            left: 0;
        }
        .divider::after {
            right: 0;
        }
        .forgot-password-link {
            text-align: right;
            margin-top: -12px;
            margin-bottom: 16px;
        }
        .forgot-password-link a {
            color: black;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .forgot-password-link a:hover {
            text-decoration: underline;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }
        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 40px;
            border-radius: 20px;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .modal-title {
            font-size: 24px;
            font-weight: 700;
            color: black;
        }
        .close {
            font-size: 32px;
            font-weight: 300;
            color: #999;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s ease;
        }
        .close:hover {
            color: #333;
        }
        .modal-description {
            color: black;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-logo">
                <span class="logo-text">10 to Master</span>
            </div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Login to continue your mastery journey</p>
            
            <div id="error-message" class="error-message"></div>
            <div id="success-message" class="success-message"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                <div class="forgot-password-link">
                    <a href="#" id="forgot-password-link">Forgot password?</a>
                </div>
                <button type="submit" class="auth-button" id="login-button">
                    Sign In
                </button>
            </form>
            
            <div class="divider">or</div>
            
            <div class="auth-links">
                Don't have an account? <a href="register.html">Sign Up</a>
            </div>
            <div class="auth-links" style="margin-top: 12px;">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgot-password-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Reset Password</h2>
                <span class="close" id="close-modal">&times;</span>
            </div>
            <p class="modal-description">
                Enter your email address and we'll send you a link to reset your password.
            </p>
            
            <div id="reset-error-message" class="error-message"></div>
            <div id="reset-success-message" class="success-message"></div>
            
            <form id="reset-password-form">
                <div class="form-group">
                    <label for="reset-email">Email</label>
                    <input type="email" id="reset-email" name="reset-email" required placeholder="your@email.com">
                </div>
                <button type="submit" class="auth-button" id="reset-button">
                    Send Reset Link
                </button>
            </form>
        </div>
    </div>

    <   </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
