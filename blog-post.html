<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10K to Mastery Blog</title>
    <meta name="description" content="Blog post from 10K to Mastery" id="meta-description">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="article" id="og-type">
    <meta property="og:url" content="" id="og-url">
    <meta property="og:title" content="Blog Post - 10K to Mastery" id="og-title">
    <meta property="og:description" content="Blog post from 10K to Mastery" id="og-description">
    <meta property="og:image" content="" id="og-image">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="" id="twitter-url">
    <meta property="twitter:title" content="Blog Post - 10K to Mastery" id="twitter-title">
    <meta property="twitter:description" content="Blog post from 10K to Mastery" id="twitter-description">
    <meta property="twitter:image" content="" id="twitter-image">
    
    <link rel="stylesheet" href="/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-content">
                <div class="logo">
                    <a href="/index.html" style="text-decoration: none; color: inherit; display: flex; align-items: center;">
                        <span class="logo-text">10K to Mastery</span>
                    </a>
                </div>
                <div class="nav-links">
                    <a href="/index.html">Home</a>
                    <a href="/index.html#pricing">Pricing</a>
                    <a href="/demo.html">Demo</a>
                    <a href="/blog.html">Blog</a>
                </div>
                <div class="nav-cta">
                    <a href="/login.html" class="btn btn-primary" style="text-decoration: none;">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Blog Post Header -->
    <section class="blog-post-header" id="post-header-image">
        <div class="blog-post-header-overlay"></div>
        <div class="container">
            <h1 id="post-title">Loading...</h1>
        </div>
    </section>

    <!-- Blog Post Content -->
    <section class="blog-post-content">
        <div class="container">
            <a href="/blog.html" class="blog-back-link">← Back to Blog</a>
            
            <article id="post-content" class="blog-post-article">
                <!-- Content will be loaded here -->
            </article>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-links">
                    <div class="footer-column">
                        <h4>Resources</h4>
                        <a href="/help-center.html">Help Center</a>
                        <a href="/blog.html">Blog</a>

                    <div class="footer-column">
                        <h4>Legal</h4>
                        <a href="/privacy.html">Privacy</a>
                        <a href="/terms.html">Terms</a>
                        <a href="/cookies.html">Cookies</a>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 10K to Mastery. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/supabase-config.js"></script>
    <script src="/script.js"></script>
    <script>
        // Load individual blog post from Supabase
        async function loadBlogPost() {
            // Resolve slug from:
            // 1. URL path: /blog/my-post-slug  (clean URL via Netlify redirect)
            // 2. Query param: ?slug=my-post-slug  (fallback)
            // 3. Hash: #post-uuid  (legacy)
            const pathParts = window.location.pathname.split('/').filter(Boolean);
            const pathSlug = pathParts.length >= 2 && pathParts[pathParts.length - 2] === 'blog'
                ? pathParts[pathParts.length - 1]
                : null;
            const urlParams = new URLSearchParams(window.location.search);
            const querySlug = urlParams.get('slug');
            const postId = window.location.hash.substring(1);

            const slug = pathSlug || querySlug;

            if (!slug && !postId) {
                document.getElementById('post-title').textContent = 'No Post Selected';
                document.getElementById('post-content').innerHTML = '<p>Please select a blog post from the <a href="blog.html">blog page</a>.</p>';
                return;
            }

            // Wait for Supabase client to be initialized
            let attempts = 0;
            while (!window.supabaseClient && attempts < 100) {
                await new Promise(resolve => setTimeout(resolve, 50));
                attempts++;
            }

            if (!window.supabaseClient) {
                document.getElementById('post-title').textContent = 'Error Loading Post';
                document.getElementById('post-content').innerHTML = '<p>Failed to connect to database. Please refresh the page.</p>';
                return;
            }

            try {
                // Fetch post from Supabase by slug or ID
                let query = window.supabaseClient
                    .from('blog_posts')
                    .select('*');

                if (slug) {
                    query = query.eq('slug', slug);
                } else {
                    query = query.eq('id', postId);
                }

                const { data: post, error } = await query.single();

                if (error) throw error;
                if (!post) throw new Error('Post not found');

                // Update SEO meta tags
                updateSEOTags(post);

                // Set header image
                const headerElement = document.getElementById('post-header-image');
                if (post.header_image_url) {
                    headerElement.style.backgroundImage = `url('${post.header_image_url}')`;
                } else {
                    headerElement.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                }

                // Set title and render content
                document.getElementById('post-title').textContent = post.title;
                const htmlContent = marked.marked(post.content);
                document.getElementById('post-content').innerHTML = htmlContent;

            } catch (error) {
                console.error('[Blog Post] Error loading blog post:', error);
                document.getElementById('post-title').textContent = 'Post Not Found';
                document.getElementById('post-content').innerHTML = '<p>Sorry, the blog post you\'re looking for doesn\'t exist or is not published yet.</p><p><a href="/blog.html">← Back to Blog</a></p>';
            }
        }

        // Update SEO meta tags with post data
        function updateSEOTags(post) {
            const pageTitle = post.title;
            const description = post.description || post.excerpt || post.content.substring(0, 160);
            const cleanUrl = `${window.location.origin}/blog/${post.slug}`;
            const imageUrl = post.header_image_url || '';

            document.title = pageTitle;

            const metaDesc = document.getElementById('meta-description');
            if (metaDesc) metaDesc.setAttribute('content', description);

            document.getElementById('og-url')?.setAttribute('content', cleanUrl);
            document.getElementById('og-title')?.setAttribute('content', post.title);
            document.getElementById('og-description')?.setAttribute('content', description);
            if (imageUrl) document.getElementById('og-image')?.setAttribute('content', imageUrl);

            document.getElementById('twitter-url')?.setAttribute('content', cleanUrl);
            document.getElementById('twitter-title')?.setAttribute('content', post.title);
            document.getElementById('twitter-description')?.setAttribute('content', description);
            if (imageUrl) document.getElementById('twitter-image')?.setAttribute('content', imageUrl);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadBlogPost);
        } else {
            loadBlogPost();
        }
    </script>
</body>
</html>
